<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wish-list</title>
  <link rel="stylesheet" href="src/style.css">
</head>

<body>
  <header>
    <h1>Wish List</h1>
  </header>
  <section>
    <p id="quoteText">...</p>
    <button id="newQuoteBtn">Ещё цитата</button>
  </section>
<main>
  <div>
    <button id=""addWishBtn>Добавить желание</button>
    <input type="text"
    id="searchInput"
    placeholder="Поиск..." />
    <select id="filterStatus">
      <option value="all">Все</option>
      <option value="active">Невыполненные</option>
      <option value="done">Выполненные</option>
    </select>
    <select name="" id="filterPriority">
      <option value="all">Любой приоритет</option>
      <option value="urgent">Срочно</option>
      <option value="Когда-нибудь"></option>
    </select>
  </div>
    <div id="wishesList"></div>
</main>
  <div id="modal">
    <div>
      <h2>Новое желание</h2>
      <input type="text" id="wishTitle" placeholder="Название"/>
      <textarea id="wishDesc" placeholder="Описание"></textarea>
      <input type="file" id="wishPhoto" accept="image.jpeg, image.png"/>
      <select id="wishPriority">
        <option value="urgent">Срочно</option>
        <option value="someday">Когда-нибудь</option>
      </select>
      <button id="saveWishBtn">Сохранить</button>
      <button id="cancelSaveBtn">Отменить</button>
    </div>
  </div>
  <script type="module" src="src/app.js"></script>
</body>

</html>
